<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Hatten Homes</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f7f7f7; }
        .login-container { max-width: 350px; margin: 80px auto; background: #fff; padding: 30px 25px; border-radius: 10px; box-shadow: 0 0 6px rgba(0,0,0,0.08); }
        .error { color: #b43535; }
        label { display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Admin Login</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for cat, msg in messages %}
                <div class="error">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <label>Username
                <input type="text" name="username" autofocus required>
            </label>
            <label>Password
                <input type="password" name="password" required>
            </label>
            <button type="submit" style="margin-top:20px;">Login</button>
        </form>
    </div>
</body>
</html>
